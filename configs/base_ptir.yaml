# @package _global_

# order in which configs override each other (/* - denotes a relative search path)
defaults:
  - /base_gs
  - _self_

n_iterations: 1500
visualize_frequency: 20
sh_indirect_iterations: 0

model:
  freeze_geometry: true
  optimize_shading_normal: false
  optimize_material_albedo: true
  optimize_material_roughness: true
  optimize_material_metallic: false
  optimize_environment: true
  alias_table_update_frequency: 32

environment:
  path: null
  type: "2d" #Supported types: "2d" or "cube".
  parameterization: "log_exp" #Supported types: "linear" or "log_exp".

initialization:
  albedo: 0.3
  roughness: 0.6

optimizer:
  params:
    material_albedo:
      lr: 0.02
    material_roughness:
      lr: 0.02
    material_metallic:
      lr: 0.0
    environment:
      lr: 0.02

# scheduler:
#   material_albedo:
#     type: exp
#     lr_init: ${optimizer.params.material_albedo.lr}
#     lr_final: 0.0002
#     max_steps: ${n_iterations}
#   material_roughness:
#     type: exp
#     lr_init: ${optimizer.params.material_roughness.lr}
#     lr_final: 0.0002
#     max_steps: ${n_iterations}
#   environment:
#     type: exp
#     lr_init: ${optimizer.params.environment.lr}
#     lr_final: 0.0002
#     max_steps: ${n_iterations}

strategy:
  densify:
    start_iteration: -1
    end_iteration: -1
  prune:
    start_iteration: -1
  reset_density:
    start_iteration: -1
  density_decay:
    start_iteration: -1
  prune_scale:
    start_iteration: -1
  albedo_decay:
    start_iteration: -1
    end_iteration: -1

loss:
  use_l1: true
  lambda_l1: 0.8

  use_l2: false
  lambda_l2: 1.0

  use_ssim: true
  lambda_ssim: 0.2

  use_albedo_prior_regularization:
    type: exp
    lambda_init: 0.5
    lambda_final: 0.05
    max_steps: 500

  use_roughness_prior_regularization:
    type: exp
    lambda_init: 0.5
    lambda_final: 0.05
    max_steps: 500

  use_roughness_high_regularization: false
  lambda_roughness_high_regularization: 0.0001

  use_light_consistency: true
  lambda_light: 0.02

  use_edge_aware_smoothness: true
  lambda_edge_aware_smoothness: 0.02
  edge_aware_smoothness_outputs:
    - pred_material
  edge_aware_smoothness_scale: 1.0 # Scales the GT image gradient in exp(-scale * gt_grad); larger values reduce smoothing more strongly at GT edges.
  edge_aware_smoothness_eps: 1.0e-3
